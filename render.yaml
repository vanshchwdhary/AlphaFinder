services:
  - type: web
    name: alphafinder
    runtime: python
    buildCommand: pip install -r requirements-render.txt
    startCommand: streamlit run src/stock_scout/dashboard/streamlit_app.py --server.port $PORT --server.address 0.0.0.0
    healthCheckPath: /
    envVars:
      - key: STOCK_SCOUT_DATABASE_URL
        fromDatabase:
          name: alphafinder-db
          property: connectionString
      - key: STOCK_SCOUT_UNIVERSE_PATH
        value: ./data/universe_sample.csv
    domains:
      - alphafinder.farmfixer.xyz

  - type: cron
    name: alphafinder-refresh
    runtime: python
    schedule: "30 10 * * MON-FRI" # 10:30 UTC (16:00 IST)
    buildCommand: pip install -r requirements-render.txt
    startCommand: python scripts/run_daily_pipeline.py
    envVars:
      - key: STOCK_SCOUT_DATABASE_URL
        fromDatabase:
          name: alphafinder-db
          property: connectionString
      - key: STOCK_SCOUT_UNIVERSE_PATH
        value: ./data/universe_sample.csv

databases:
  - name: alphafinder-db
